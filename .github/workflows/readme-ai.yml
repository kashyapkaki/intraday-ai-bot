name: Auto Update README

on:
  push:
    branches: [main]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate README with ReadmeAI
        id: readmeai
        uses: readme-ai/action@v1
        with:
          repo_url: https://github.com/kashyapkaki/intraday-ai-bot
          api_key: ${{ secrets.README_AI_KEY }}
          api_endpoint: http://localhost:5173

      - name: Commit updated README
        run: |
          git config user.name  "ReadmeAI Bot"
          git config user.email "bot@readme-ai.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: auto-update README via ReadmeAI"
          git push
