name: Auto Update README

on:
  push:
    branches: [main]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate README with ReadmeAI
        run: |
          RESPONSE=$(curl --silent --show-error --fail --max-time 120 --retry 3 --retry-delay 5 \
            -X POST "https://api.readmeai.in/api/webhook/regenerate" \
            -H "Content-Type: application/json" \
            -d '{
              "repoUrl":   "https://github.com/kashyapkaki/intraday-ai-bot",
              "apiKey":    "'${{ secrets.README_AI_KEY }}'",
              "branch":    "main",
              "commitSha": "'${{ github.sha }}'",
              "actor":     "'${{ github.actor }}'"
            }')

          SUCCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success',''))")
          if [ "$SUCCESS" != "True" ]; then
            echo "ReadmeAI error: $(echo \"$RESPONSE\" | python3 -c \"import sys,json; print(json.load(sys.stdin).get('error','unknown'))\")"
            exit 1
          fi

          python3 -c "import sys,json; print(json.load(sys.stdin)['content'])" <<< "$RESPONSE" > README.md
          echo "README.md regenerated successfully."

      - name: Commit updated README
        run: |
          git config user.name  "ReadmeAI Bot"
          git config user.email "bot@readmeai.in"
          git add README.md
          git diff --staged --quiet || (git commit -m "docs: auto-update README via ReadmeAI" && git push)
