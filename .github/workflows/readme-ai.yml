name: Auto Update README

on:
  push:
    branches: [main]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate README with ReadmeAI
        uses: readme-ai/action@v1
        with:
          repo_url:     https://github.com/kashyapkaki/intraday-ai-bot
          api_key:      ${{ secrets.README_AI_KEY }}
          api_endpoint: https://www.readmeai.in
